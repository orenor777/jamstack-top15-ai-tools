services:
  - type: web
    name: taaft-nextjs-native
    runtime: static
    plan: free
    rootDir: .
    buildCommand: "true"
    staticPublishPath: sites/nextjs/out
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /categories/*
        destination: /categories/*/index.html
      - type: rewrite
        source: /tools/*
        destination: /tools/*/index.html
    autoDeployTrigger: off

  - type: web
    name: taaft-hugo-native
    runtime: static
    plan: free
    rootDir: .
    buildCommand: "true"
    staticPublishPath: sites/hugo/public
    autoDeployTrigger: off

  - type: web
    name: taaft-mkdocs-native
    runtime: static
    plan: free
    rootDir: .
    buildCommand: "true"
    staticPublishPath: sites/mkdocs/site
    autoDeployTrigger: off
